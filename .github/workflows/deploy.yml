name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$APPS_SCRIPT_URL" ]; then
            echo "::error::Missing secret: APPS_SCRIPT_URL"
            exit 1
          fi
          # GOOGLE_CALENDAR_ID / GOOGLE_API_KEY 為選用（行事曆匯入功能用）；未設定則留空字串
          cat > config.js <<EOF
          const CONFIG = {
            APPS_SCRIPT_URL: "${APPS_SCRIPT_URL}",
            GOOGLE_CALENDAR_ID: "${GOOGLE_CALENDAR_ID}",
            GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
          };
          EOF

      - name: Cache-bust local assets in index.html
        run: |
          # 用 commit SHA 當版本號，避免瀏覽器快取舊的 app.js/style.css/config.js
          V="${GITHUB_SHA:0:8}"
          sed -i \
            -e "s|href=\"style.css\"|href=\"style.css?v=${V}\"|" \
            -e "s|src=\"config.js\"|src=\"config.js?v=${V}\"|" \
            -e "s|src=\"app.js\"|src=\"app.js?v=${V}\"|" \
            index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
