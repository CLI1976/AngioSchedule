<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AngioSchedule 排班行事曆</title>

  <!-- FullCalendar (v6 ships CSS inside the JS bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.15/locales/zh-tw.global.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1>AngioSchedule 排班行事曆</h1>
    <div class="header-actions">
      <button id="btn-login" class="btn btn-secondary">登入</button>
      <button id="btn-import-calendar" class="btn btn-primary" hidden>從 Google 行事曆匯入</button>
      <button id="btn-print" class="btn btn-secondary">列印本週</button>
      <button id="btn-export" class="btn btn-secondary">匯出 .ics</button>
      <button id="btn-logout" class="btn btn-ghost" hidden>登出</button>
    </div>
  </header>

  <!-- 列印專用版面（畫面隱藏，僅列印時顯示） -->
  <div id="print-area" aria-hidden="true"></div>

  <main>
    <div id="calendar"></div>

    <!-- 自訂「天」視圖 -->
    <div id="day-view" hidden>
      <div class="day-view-toolbar">
        <button id="day-back" class="btn btn-secondary">← 返回週視圖</button>
        <div class="day-view-nav">
          <button id="day-prev" class="btn btn-ghost">‹</button>
          <button id="day-today" class="btn btn-secondary">今天</button>
          <button id="day-next" class="btn btn-ghost">›</button>
        </div>
        <h2 id="day-view-title"></h2>
      </div>
      <div class="table-wrapper">
        <table id="day-view-table">
          <thead>
            <tr>
              <th class="col-time">時間</th>
              <th class="col-patient">病人資料</th>
              <th class="col-phone">電話</th>
              <th class="col-site">術式/部位</th>
              <th class="col-note">備註</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- 從 Google 行事曆匯入 Modal -->
  <div id="modal-calendar" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-wide">
      <header class="modal-header">
        <h2>從 Google 行事曆匯入排班</h2>
        <button class="modal-close" data-close="modal-calendar">×</button>
      </header>
      <div class="modal-body">
        <!-- 步驟 1：選擇行事曆與週數 -->
        <div id="cal-step-select">
          <p class="hint" id="cal-current-week">目前為 — 年 第 — 週</p>
          <p class="hint">讀取行事曆：<span id="cal-source-info" class="cal-source-id">—</span></p>
          <div class="week-range">
            <label>起始週次
              <input type="number" id="cal-start-week" min="1" max="53" step="1">
            </label>
            <label>共幾週
              <input type="number" id="cal-week-count" min="1" max="12" step="1" value="2">
            </label>
          </div>
          <p class="hint" id="cal-range-preview"></p>
          <div class="modal-actions">
            <button id="btn-fetch-calendar" class="btn btn-primary">抓取資料</button>
            <button class="btn btn-ghost" data-close="modal-calendar">取消</button>
          </div>
        </div>

        <div id="cal-step-loading" hidden>
          <div class="loader"></div>
          <p>從 Google 行事曆讀取中...</p>
        </div>

        <!-- 步驟 2：確認匯入 -->
        <div id="cal-step-confirm" hidden>
          <p class="hint">已從行事曆標題自動拆解欄位，請確認或修正後匯入。</p>
          <div class="table-wrapper">
            <table id="cal-result-table">
              <thead>
                <tr>
                  <th>日期</th>
                  <th>時間</th>
                  <th>姓名</th>
                  <th>病歷號</th>
                  <th>電話</th>
                  <th>術式/部位</th>
                  <th>備註</th>
                  <th>不確定</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
          <div class="modal-actions">
            <button id="btn-confirm-calendar" class="btn btn-primary">確認匯入</button>
            <button class="btn btn-secondary" id="btn-calendar-back">← 重新選擇</button>
            <button class="btn btn-ghost" data-close="modal-calendar">取消</button>
          </div>
        </div>

        <div id="cal-step-error" hidden>
          <p class="error-msg"></p>
          <button class="btn btn-secondary" id="btn-calendar-retry">重試</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 編輯 Modal -->
  <div id="modal-edit" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <header class="modal-header">
        <h2>編輯排班</h2>
        <button class="modal-close" data-close="modal-edit">×</button>
      </header>
      <div class="modal-body">
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          <label>日期 <input type="date" id="edit-date" required></label>
          <label>時間
            <div class="time-picker">
              <select id="edit-time-period">
                <option value="AM">上午</option>
                <option value="PM">下午</option>
              </select>
              <select id="edit-time-hour"></select>
              <span class="time-sep">:</span>
              <select id="edit-time-minute">
                <option value="00">00</option>
                <option value="30">30</option>
              </select>
            </div>
          </label>
          <label>姓名 <input type="text" id="edit-name" required></label>
          <label>病歷號 <input type="text" id="edit-chart_no"></label>
          <label>電話 <input type="tel" id="edit-phone"></label>
          <label>術式/部位 <input type="text" id="edit-site"></label>
          <label>備註 <textarea id="edit-note" rows="2"></textarea></label>
          <label class="checkbox-label">
            <input type="checkbox" id="edit-uncertain"> 標記為不確定
          </label>
          <div class="modal-actions">
            <button type="submit" class="btn btn-primary">儲存</button>
            <button type="button" id="btn-delete" class="btn btn-danger">刪除</button>
            <button type="button" class="btn btn-ghost" data-close="modal-edit">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
